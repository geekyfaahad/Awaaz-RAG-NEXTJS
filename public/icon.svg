<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gradCheck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#030303" rx="112" />

  <!-- Audio Wave representing Awaaz (Voice) -->
  <g transform="translate(-15, 0)">
    <rect x="150" y="240" width="32" height="60" rx="16" fill="url(#gradBar)" />
    <rect x="210" y="180" width="32" height="180" rx="16" fill="url(#gradBar)" />
    <rect x="270" y="120" width="32" height="280" rx="16" fill="url(#gradBar)" />
    <rect x="330" y="190" width="32" height="150" rx="16" fill="url(#gradBar)" />
    <rect x="390" y="250" width="32" height="40" rx="16" fill="url(#gradBar)" />
  </g>

  <!-- Bright Checkmark representing Fact-Checking/Trust -->
  <path d="M 280 290 L 340 350 L 460 210" 
        fill="none" 
        stroke="url(#gradCheck)" 
        stroke-width="56" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />
</svg>
